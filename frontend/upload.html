            <nav>
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="#" id="logoutLink">Выйти</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div class="upload-form">
            <h2>📤 Загрузка новой работы</h2>
            <form id="uploadForm" enctype="multipart/form-data">
                <label>Название работы</label>
                <input type="text" id="title" placeholder="Введите название" required>

                <label>Тип работы</label>
                <select id="type" required>
                    <option value="">Выберите тип</option>
                    <option value="article">📄 Научная статья</option>
                    <option value="competition">🏆 Конкурсная работа</option>
                </select>

                <label>Файл</label>
                <div class="file-upload-wrapper">
                    <div class="file-upload-area" id="fileDropArea">
                        <span class="file-placeholder" id="filePlaceholder">Файл не выбран</span>
                        <span class="file-name" id="fileName" style="display:none;"></span>
                        <button type="button" class="file-btn" id="fileSelectBtn">Выбрать файл</button>
                    </div>
                    <input type="file" id="fileInput" accept=".pdf,.doc,.docx" required>
                </div>
                <div class="file-info">Разрешены: PDF, DOC, DOCX (макс. 10 МБ)</div>

                <button type="submit" class="upload-btn">⬆ Загрузить работу</button>
                <div id="message"></div>
                <a href="index.html" class="back-link">← Вернуться на главную</a>
            </form>
        </div>
    </main>
    <footer>
        <div>
            <h3>Контакты:</h3>
            <p>email@example.com</p>
        </div>
        <div>
            <h3>Адрес:</h3>
            <p>г. Москва, ул. Примерная, д. 1</p>
        </div>
    </footer>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        document.getElementById('logoutLink').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        });

        // Логика кастомного файлового поля
        const fileInput = document.getElementById('fileInput');
        const filePlaceholder = document.getElementById('filePlaceholder');
        const fileName = document.getElementById('fileName');
        const fileDropArea = document.getElementById('fileDropArea');
        const fileSelectBtn = document.getElementById('fileSelectBtn');

        // Клик по кнопке "Выбрать файл" или по области
        fileSelectBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
        });
        fileDropArea.addEventListener('click', () => fileInput.click());

        // Обновление имени файла
        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (file) {
                filePlaceholder.style.display = 'none';
                fileName.style.display = 'inline';
                fileName.textContent = file.name;
                fileDropArea.style.borderColor = '#007cba';
                fileDropArea.style.background = '#f0f7fc';
            } else {
                filePlaceholder.style.display = 'inline';
                fileName.style.display = 'none';
                fileDropArea.style.borderColor = '#ccc';
                fileDropArea.style.background = '#f9f9f9';
            }
        });

        // Отправка формы
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value.trim();
            const type = document.getElementById('type').value;
            const file = fileInput.files[0];
            const messageDiv = document.getElementById('message');

            if (!title || !type || !file) {
                messageDiv.innerHTML = '<span style="color:red;">Заполните все поля</span>';
                return;
            }

            const formData = new FormData();
            formData.append('title', title);
            formData.append('type', type);
            formData.append('file', file);

            try {
                const response = await fetch('http://localhost:4000/api/works', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await response.json();
                if (response.ok) {
                    messageDiv.innerHTML = '<span style="color:green;">✅ Работа успешно загружена!</span>';
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    messageDiv.innerHTML = `<span style="color:red;">❌ ${data.error || 'Ошибка загрузки'}</span>`;
                }
            } catch (err) {
                messageDiv.innerHTML = '<span style="color:red;">Ошибка соединения с сервером</span>';
                console.error(err);
            }
        });
    </script>
</body>
</html>
