<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="index.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка работы</title>
    <!-- Подключаем FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Дополнительные стили для шапки, если index.css не хватает */
        .navigation {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 50px;
            background-color: #007cba;
            width: 100%;
        }
        .logo a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 24px;
        }
        nav ul {
            display: flex;
            gap: 30px;
            list-style: none;
            margin: 0;
            padding: 0;
            align-items: center;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            transition: color 0.2s;
        }
        nav ul li a:hover {
            color: #2C3E8F;
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .navigation { padding: 10px 20px; flex-direction: column; align-items: stretch; }
            nav ul { justify-content: center; gap: 15px; flex-wrap: wrap; }
        }
        footer {
            margin-top: 40px;
            padding: 20px;
            background: #f1f1f1;
            text-align: center;
        }
        /* Сохраняем стили формы как были */
        .upload-form { max-width: 580px; margin: 40px auto; padding: 30px 25px; background: white; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); border: 1px solid #ddd; width: 100%; }
        .upload-form h2 { text-align: center; color: #035680; font-weight: 600; margin-bottom: 25px; border-bottom: 2px solid #Dfe8f2; padding-bottom: 15px; }
        .upload-form label { font-size: 18px; margin-top: 18px; display: block; }
        .upload-form input, .upload-form select { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; background: #fafafa; transition: border-color 0.3s, box-shadow 0.3s; display: block; box-sizing: border-box; height: auto; }
        .upload-form input:focus, .upload-form select:focus { border-color: #007cba; outline: none; box-shadow: 0 0 0 3px rgba(0,124,186,0.2); background: #fff; }
        .file-upload-wrapper { position: relative; width: 100%; margin-top: 5px; }
        .file-upload-wrapper .file-upload-area { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border: 2px dashed #ccc; border-radius: 8px; background: #f9f9f9; cursor: pointer; transition: border-color 0.3s, background 0.3s; min-height: 54px; flex-wrap: wrap; gap: 10px; }
        .file-upload-wrapper .file-upload-area:hover { border-color: #007cba; background: #f0f7fc; }
        .file-upload-wrapper .file-upload-area .file-placeholder { color: #888; font-size: 15px; }
        .file-upload-wrapper .file-upload-area .file-name { color: #035680; font-weight: 500; font-size: 15px; word-break: break-all; max-width: 70%; }
        .file-upload-wrapper .file-upload-area .file-btn { background: #007cba; color: white; padding: 6px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: background 0.3s; white-space: nowrap; }
        .file-upload-wrapper .file-upload-area .file-btn:hover { background: #035680; }
        .file-upload-wrapper input[type="file"] { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
        .file-info { font-size: 13px; color: #888; margin-top: 6px; }
        .upload-btn { width: 100%; padding: 14px; background: #035680; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: 600; cursor: pointer; transition: background 0.3s, transform 0.1s; margin-top: 22px; }
        .upload-btn:hover { background: #02456b; transform: scale(1.02); }
        .back-link { display: inline-block; margin-top: 20px; color: #007cba; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
  <header>
    <div class="navigation">
      <h1 class="logo">
        <a href="index.html">Экспертум</a>
        <svg style="fill:#007cba" width="40px" height="40px" fill="#ffffff" viewBox="-3.2 -3.2 38.40 38.40" version="1.1" xmlns="http://www.w3.org/2000/svg" transform="matrix(1, 0, 0, 1, 0, 0)rotate(0)">
          <g id="SVGRepo_bgCarrier" stroke-width="0">
            <path transform="translate(-3.2, -3.2), scale(2.4)" fill="#ffffff" d="M9.166.33a2.25 2.25 0 00-2.332 0l-5.25 3.182A2.25 2.25 0 00.5 5.436v5.128a2.25 2.25 0 001.084 1.924l5.25 3.182a2.25 2.25 0 002.332 0l5.25-3.182a2.25 2.25 0 001.084-1.924V5.436a2.25 2.25 0 00-1.084-1.924L9.166.33z" strokewidth="0"/>
          </g>
          <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"/>
          <g id="SVGRepo_iconCarrier">
            <title>alt-book</title>
            <path d="M0 26.016q0 0.832 0.576 1.408t1.44 0.576q1.92 0.096 3.808 0.288t4.352 0.736 3.904 1.28q0.096 0.736 0.64 1.216t1.28 0.48 1.28-0.48 0.672-1.216q1.44-0.736 3.872-1.28t4.352-0.736 3.84-0.288q0.8 0 1.408-0.576t0.576-1.408v-24q0-0.832-0.576-1.408t-1.408-0.608q-0.032 0-0.096 0.032t-0.128 0q-9.504 0.256-12.672 2.528-1.024 0.768-1.12 1.44l-0.096-0.32q-0.576-1.28-3.168-2.176-3.648-1.28-10.528-1.472-0.064 0-0.128 0t-0.064-0.032q-0.832 0-1.44 0.608t-0.576 1.408v24zM4 24.128v-19.936q6.88 0.512 10.016 2.080v19.744q-3.104-1.536-10.016-1.888zM6.016 20q0.096 0 0.32 0.032t0.832 0.032 1.216 0.096 1.248 0.224 1.184 0.352 0.832 0.544 0.352 0.736v-4q0-0.096-0.032-0.224t-0.352-0.48-0.896-0.608-1.792-0.48-2.912-0.224v4zM6.016 12q0.096 0 0.32 0.032t0.832 0.032 1.216 0.096 1.248 0.224 1.184 0.352 0.832 0.544 0.352 0.736v-4q0-0.096-0.032-0.224t-0.352-0.48-0.896-0.608-1.792-0.48-2.912-0.224v4zM18.016 26.016v-19.744q3.104-1.568 9.984-2.080v19.936q-6.912 0.352-9.984 1.888zM20 22.016q0-0.576 0.608-0.992t1.504-0.576 1.76-0.288 1.504-0.128l0.64-0.032v-4q-1.696 0-2.944 0.224t-1.792 0.48-0.864 0.608-0.384 0.512l-0.032 0.192v4zM20 14.016q0-0.576 0.608-0.992t1.504-0.576 1.76-0.288 1.504-0.128l0.64-0.032v-4q-1.696 0-2.944 0.224t-1.792 0.48-0.864 0.608-0.384 0.512l-0.032 0.192v4z"/>
          </g>
        </svg>
      </h1>
      <nav>
        <ul>
          <li><a href="dashboard.html"><i class="fas fa-user"></i> Личный кабинет</a></li>
          <li><button id="roleToggleBtn" class="role-toggle-btn"><span id="currentRoleDisplay">Автор</span> ▼</button></li>
          <li><a href="#" id="logoutLink"><i class="fas fa-sign-out-alt"></i> Выйти</a></li>
        </ul>
      </nav>
    </div>
  </header>
    <main>
        <div class="upload-form">
            <h2>📤 Загрузка новой работы</h2>
            <form id="uploadForm" enctype="multipart/form-data">
                <label>Название работы</label>
                <input type="text" id="title" placeholder="Введите название" required>

                <label>Тип работы</label>
                <select id="type" required>
                    <option value="">Выберите тип</option>
                    <option value="article">📄 Научная статья</option>
                    <option value="competition">🏆 Конкурсная работа</option>
                </select>

                <label>Файл</label>
                <div class="file-upload-wrapper">
                    <div class="file-upload-area" id="fileDropArea">
                        <span class="file-placeholder" id="filePlaceholder">Файл не выбран</span>
                        <span class="file-name" id="fileName" style="display:none;"></span>
                        <button type="button" class="file-btn" id="fileSelectBtn">Выбрать файл</button>
                    </div>
                    <input type="file" id="fileInput" accept=".pdf,.doc,.docx" required>
                </div>
                <div class="file-info">Разрешены: PDF, DOC, DOCX (макс. 10 МБ)</div>

                <button type="submit" class="upload-btn">⬆ Загрузить работу</button>
                <div id="message"></div>
                <a href="index.html" class="back-link">← Вернуться на главную</a>
            </form>
        </div>
    </main>
    <footer>
        <div>
            <h3>Контакты:</h3>
            <p>email@example.com</p>
        </div>
        <div>
            <h3>Адрес:</h3>
            <p>г. Москва, ул. Примерная, д. 1</p>
        </div>
    </footer>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        document.getElementById('logoutLink').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        });

        // Логика кастомного файлового поля
        const fileInput = document.getElementById('fileInput');
        const filePlaceholder = document.getElementById('filePlaceholder');
        const fileName = document.getElementById('fileName');
        const fileDropArea = document.getElementById('fileDropArea');
        const fileSelectBtn = document.getElementById('fileSelectBtn');

        fileSelectBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
        });
        fileDropArea.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (file) {
                filePlaceholder.style.display = 'none';
                fileName.style.display = 'inline';
                fileName.textContent = file.name;
                fileDropArea.style.borderColor = '#007cba';
                fileDropArea.style.background = '#f0f7fc';
            } else {
                filePlaceholder.style.display = 'inline';
                fileName.style.display = 'none';
                fileDropArea.style.borderColor = '#ccc';
                fileDropArea.style.background = '#f9f9f9';
            }
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value.trim();
            const type = document.getElementById('type').value;
            const file = fileInput.files[0];
            const messageDiv = document.getElementById('message');

            if (!title || !type || !file) {
                messageDiv.innerHTML = '<span style="color:red;">Заполните все поля</span>';
                return;
            }

            const formData = new FormData();
            formData.append('title', title);
            formData.append('type', type);
            formData.append('file', file);

            try {
                const response = await fetch('/api/works', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await response.json();
                if (response.ok) {
                    messageDiv.innerHTML = '<span style="color:green;">✅ Работа успешно загружена!</span>';
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    messageDiv.innerHTML = `<span style="color:red;">❌ ${data.error || 'Ошибка загрузки'}</span>`;
                }
            } catch (err) {
                messageDiv.innerHTML = '<span style="color:red;">Ошибка соединения с сервером</span>';
                console.error(err);
            }
        });
    </script>
</body>
</html>
