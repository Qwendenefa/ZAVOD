<head>

                </svg>
            </h1>
            <nav>
                <ul id="navMenu">
                    <!-- Будет заполняться скриптом -->
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="dashboard-container">
            <!-- Шапка профиля -->
            <div class="dashboard-header" id="profileHeader">
                <div class="dashboard-avatar" id="userAvatar">👤</div>
                <div class="dashboard-user-info">
                    <h2 id="userName">Пользователь</h2>
                    <p id="userEmail">email@example.com</p>
                    <span class="role-badge" id="userRole">Автор</span>
                </div>
            </div>

            <!-- Статистика -->
            <div class="dashboard-stats">
                <div class="stat-card">
                    <div class="stat-number" id="worksCount">0</div>
                    <div class="stat-label">Загружено работ</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">—</div>
                    <div class="stat-label">На рецензии</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">—</div>
                    <div class="stat-label">Оценено</div>
                </div>
            </div>

            <!-- Быстрые действия -->
            <div class="dashboard-actions">
                <a href="upload.html" class="action-btn primary">
                    <span class="action-icon">📤</span>
                    Загрузить работу
                </a>
                <a href="my-articles.html" class="action-btn">
                    <span class="action-icon">📚</span>
                    Мои работы
                </a>
                <a href="works-list.html" class="action-btn">
                    <span class="action-icon">📋</span>
                    Все работы
                </a>
            </div>

            <!-- Выход -->
            <div class="dashboard-footer">
                <button id="logoutBtn">Выйти</button>
            </div>
        </div>
    </main>

    <footer>
        <div>
            <h3>Контакты:</h3>
            <p>email@example.com</p>
        </div>
        <div>
            <h3>Адрес:</h3>
            <p>г. Москва, ул. Примерная, д. 1</p>
        </div>
    </footer>

    <script>
        (function() {
            const token = localStorage.getItem('token');
            const navMenu = document.getElementById('navMenu');

            // Если нет токена – перенаправляем на страницу входа
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            // Навигация для авторизованных
            navMenu.innerHTML = `
                <li><a href="index.html">Главная</a></li>
                <li><a href="#" id="logoutLink">Выйти</a></li>
            `;
            document.getElementById('logoutLink').addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            });

            // Элементы профиля
            const userAvatar = document.getElementById('userAvatar');
            const userName = document.getElementById('userName');
            const userEmail = document.getElementById('userEmail');
            const userRole = document.getElementById('userRole');
            const worksCount = document.getElementById('worksCount');

            // Загрузка профиля и работ
            Promise.all([
                fetch('/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                }),
                fetch('/api/works', {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
            ])
            .then(async ([profileRes, worksRes]) => {
                if (!profileRes.ok) {
                    if (profileRes.status === 401) {
                        localStorage.removeItem('token');
                        window.location.href = 'login.html';
                    }
                    throw new Error('Не удалось загрузить профиль');
                }
                const user = await profileRes.json();
                const works = worksRes.ok ? await worksRes.json() : [];

                localStorage.setItem('user', JSON.stringify(user));

                const initial = (user.login || user.email || 'U')[0].toUpperCase();
                userAvatar.textContent = initial;
                userName.textContent = user.login || 'Пользователь';
                userEmail.textContent = user.email;
                const roleMap = {
                    'author': 'Автор',
                    'expert': 'Эксперт',
                    'admin': 'Администратор',
                    'user': 'Автор'
                };
                userRole.textContent = roleMap[user.role] || user.role;
                worksCount.textContent = works.length;
            })
            .catch(err => {
                console.error(err);
                document.querySelector('.dashboard-header').innerHTML += 
                    `<div style="color:red; margin-top:10px;">Ошибка загрузки данных</div>`;
            });

            // Выход
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            });
        })();
    </script>
</body>
</html>
