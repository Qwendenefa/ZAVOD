<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет — Экспертум</title>
  <link rel="stylesheet" href="index.css">
  <style>
    /* ========== СТИЛИ ДЛЯ ШТОРКИ ========== */
    .role-toggle-btn {
      background: none;
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 6px 16px;
      cursor: pointer;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 15px;
      transition: border-color 0.2s;
      background: white;
    }
    .role-toggle-btn:hover {
      border-color: #007cba;
    }

    .role-drawer {
      position: fixed;
      top: 0;
      right: -320px;
      width: 300px;
      height: 100%;
      background: white;
      box-shadow: -4px 0 20px rgba(0,0,0,0.15);
      transition: right 0.3s ease;
      z-index: 1000;
      padding: 20px;
      overflow-y: auto;
    }
    .role-drawer.open {
      right: 0;
    }
    .role-drawer.hidden {
      display: none;
    }

    .drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      z-index: 999;
    }
    .drawer-overlay.hidden {
      display: none;
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }
    .drawer-header h4 {
      margin: 0;
      font-size: 18px;
    }
    #closeDrawerBtn {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #999;
      line-height: 1;
    }
    #closeDrawerBtn:hover {
      color: #333;
    }

    .role-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }
    .role-option {
      padding: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      text-align: left;
      font-size: 15px;
      transition: all 0.2s;
    }
    .role-option:hover {
      background: #f0f4ff;
      border-color: #4a6cf7;
    }
    .role-option.active {
      background: #4a6cf7;
      color: white;
      border-color: #4a6cf7;
    }

    /* ========== АДАПТАЦИЯ ШАПКИ ========== */
    .navigation {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 10px 20px;
    }
    .navigation nav ul {
      display: flex;
      list-style: none;
      gap: 20px;
      margin: 0;
      padding: 0;
      align-items: center;
    }
    @media (max-width: 600px) {
      .role-toggle-btn {
        margin-left: 0;
        margin-top: 5px;
      }
    }

    /* ========== ОБЩИЕ СТИЛИ ДЛЯ ДАШБОРДА ========== */
    .dashboard-container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .dashboard-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
      margin-bottom: 30px;
    }
    .dashboard-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #007cba;
      color: white;
      font-size: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .dashboard-user-info h2 {
      margin: 0 0 5px 0;
    }
    .dashboard-user-info p {
      margin: 0 0 5px 0;
      color: #666;
    }
    .role-badge {
      display: inline-block;
      background: #007cba;
      color: white;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
    }

    .dashboard-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .stat-number {
      font-size: 32px;
      font-weight: 700;
      color: #007cba;
    }
    .stat-label {
      color: #666;
      margin-top: 5px;
      font-size: 14px;
    }

    .dashboard-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 30px;
    }
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #f0f0f0;
      border-radius: 8px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
      transition: background 0.2s;
    }
    .action-btn:hover {
      background: #e0e0e0;
    }
    .action-btn.primary {
      background: #007cba;
      color: white;
    }
    .action-btn.primary:hover {
      background: #005f8a;
    }
    .action-icon {
      font-size: 20px;
    }

    .dashboard-footer {
      text-align: center;
      padding: 20px 0;
    }
    #logoutBtn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 10px 30px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    #logoutBtn:hover {
      background: #c82333;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      background: #f1f1f1;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <div class="navigation">
      <h1 class="logo">
        <a href="index.html">Экспертум</a>
        <svg style="fill:#007cba" width="40px" height="40px" fill="#ffffff" viewBox="-3.2 -3.2 38.40 38.40" version="1.1" xmlns="http://www.w3.org/2000/svg" transform="matrix(1, 0, 0, 1, 0, 0)rotate(0)">
          <g id="SVGRepo_bgCarrier" stroke-width="0">
            <path transform="translate(-3.2, -3.2), scale(2.4)" fill="#ffffff" d="M9.166.33a2.25 2.25 0 00-2.332 0l-5.25 3.182A2.25 2.25 0 00.5 5.436v5.128a2.25 2.25 0 001.084 1.924l5.25 3.182a2.25 2.25 0 002.332 0l5.25-3.182a2.25 2.25 0 001.084-1.924V5.436a2.25 2.25 0 00-1.084-1.924L9.166.33z" strokewidth="0"/>
          </g>
          <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"/>
          <g id="SVGRepo_iconCarrier">
            <title>alt-book</title>
            <path d="M0 26.016q0 0.832 0.576 1.408t1.44 0.576q1.92 0.096 3.808 0.288t4.352 0.736 3.904 1.28q0.096 0.736 0.64 1.216t1.28 0.48 1.28-0.48 0.672-1.216q1.44-0.736 3.872-1.28t4.352-0.736 3.84-0.288q0.8 0 1.408-0.576t0.576-1.408v-24q0-0.832-0.576-1.408t-1.408-0.608q-0.032 0-0.096 0.032t-0.128 0q-9.504 0.256-12.672 2.528-1.024 0.768-1.12 1.44l-0.096-0.32q-0.576-1.28-3.168-2.176-3.648-1.28-10.528-1.472-0.064 0-0.128 0t-0.064-0.032q-0.832 0-1.44 0.608t-0.576 1.408v24zM4 24.128v-19.936q6.88 0.512 10.016 2.080v19.744q-3.104-1.536-10.016-1.888zM6.016 20q0.096 0 0.32 0.032t0.832 0.032 1.216 0.096 1.248 0.224 1.184 0.352 0.832 0.544 0.352 0.736v-4q0-0.096-0.032-0.224t-0.352-0.48-0.896-0.608-1.792-0.48-2.912-0.224v4zM6.016 12q0.096 0 0.32 0.032t0.832 0.032 1.216 0.096 1.248 0.224 1.184 0.352 0.832 0.544 0.352 0.736v-4q0-0.096-0.032-0.224t-0.352-0.48-0.896-0.608-1.792-0.48-2.912-0.224v4zM18.016 26.016v-19.744q3.104-1.568 9.984-2.080v19.936q-6.912 0.352-9.984 1.888zM20 22.016q0-0.576 0.608-0.992t1.504-0.576 1.76-0.288 1.504-0.128l0.64-0.032v-4q-1.696 0-2.944 0.224t-1.792 0.48-0.864 0.608-0.384 0.512l-0.032 0.192v4zM20 14.016q0-0.576 0.608-0.992t1.504-0.576 1.76-0.288 1.504-0.128l0.64-0.032v-4q-1.696 0-2.944 0.224t-1.792 0.48-0.864 0.608-0.384 0.512l-0.032 0.192v4z"/>
          </g>
        </svg>
      </h1>
      <nav>
        <ul id="navMenu">
          <!-- Заполняется динамически -->
        </ul>
      </nav>
      <button id="roleToggleBtn" class="role-toggle-btn">
        <span id="currentRoleDisplay">Автор</span> ▼
      </button>
    </div>
  </header>

  <main>
    <div class="dashboard-container">
      <!-- Шапка профиля -->
      <div class="dashboard-header" id="profileHeader">
        <div class="dashboard-avatar" id="userAvatar">👤</div>
        <div class="dashboard-user-info">
          <h2 id="userName">Пользователь</h2>
          <p id="userEmail">email@example.com</p>
          <span class="role-badge" id="userRole">Автор</span>
        </div>
      </div>

      <!-- Статистика -->
      <div class="dashboard-stats">
        <div class="stat-card">
          <div class="stat-number" id="worksCount">0</div>
          <div class="stat-label">Загружено работ</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">—</div>
          <div class="stat-label">На рецензии</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">—</div>
          <div class="stat-label">Оценено</div>
        </div>
      </div>

      <!-- Быстрые действия -->
      <div class="dashboard-actions" id="dashboardActions">
        <!-- Заполняется скриптом -->
      </div>

      <!-- Выход -->
      <div class="dashboard-footer">
        <button id="logoutBtn">Выйти</button>
      </div>
    </div>
  </main>

  <!-- Оверлей и шторка -->
  <div id="drawerOverlay" class="drawer-overlay hidden"></div>
  <div id="roleDrawer" class="role-drawer hidden">
    <div class="drawer-header">
      <h4>Смена роли</h4>
      <button id="closeDrawerBtn">&times;</button>
    </div>
    <div class="drawer-body">
      <p>Текущая роль: <strong id="drawerCurrentRole">Автор</strong></p>
      <div class="role-options">
        <button class="role-option" data-role="author">📝 Автор</button>
        <button class="role-option" data-role="expert">🔍 Эксперт</button>
        <button class="role-option" data-role="admin">⚙️ Администратор</button>
      </div>
    </div>
  </div>

  <footer>
    <div><h3>Контакты:</h3><p>email@example.com</p></div>
    <div><h3>Адрес:</h3><p>г. Москва, ул. Примерная, д. 1</p></div>
  </footer>

  <script>
    (function() {
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      // ========== 1. НАВИГАЦИЯ (шапка) — изменено ==========
      const navMenu = document.getElementById('navMenu');
      function buildNav() {
        navMenu.innerHTML = `
          <li><a href="dashboard.html">Личный кабинет</a></li>
          <li><a href="#" id="logoutLink">Выйти</a></li>
        `;
        document.getElementById('logoutLink')?.addEventListener('click', (e) => {
          e.preventDefault();
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          window.location.href = 'index.html';
        });
      }
      buildNav();

      // ========== 2. ПРОФИЛЬ, СТАТИСТИКА, ШТОРКА ==========
      let currentUser = null;
      try {
        currentUser = JSON.parse(localStorage.getItem('user') || 'null');
      } catch (e) {}

      const userAvatar = document.getElementById('userAvatar');
      const userName = document.getElementById('userName');
      const userEmail = document.getElementById('userEmail');
      const userRole = document.getElementById('userRole');
      const worksCount = document.getElementById('worksCount');

      const currentRoleDisplay = document.getElementById('currentRoleDisplay');
      const drawerCurrentRole = document.getElementById('drawerCurrentRole');

      function updateRoleUI(user) {
        const roleMap = {
          'author': 'Автор',
          'expert': 'Эксперт',
          'admin': 'Администратор'
        };
        const displayName = roleMap[user.role] || user.role;
        currentRoleDisplay.textContent = displayName;
        drawerCurrentRole.textContent = displayName;
        userRole.textContent = displayName;

        document.querySelectorAll('.role-option').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.role === user.role);
        });
      }

      // ========== 3. БЫСТРЫЕ ДЕЙСТВИЯ (в зависимости от роли) ==========
      function buildActions(role) {
        const actionsContainer = document.getElementById('dashboardActions');
        let html = `
          <a href="upload.html" class="action-btn primary">
            <span class="action-icon">📤</span> Загрузить работу
          </a>
          <a href="my-articles.html" class="action-btn">
            <span class="action-icon">📚</span> Мои работы
          </a>
        `;
        if (role === 'admin') {
          html += `
            <a href="admin-works.html" class="action-btn">
              <span class="action-icon">⚙️</span> Панель администратора
            </a>
          `;
        } else if (role === 'expert') {
          html += `
            <a href="expert-works.html" class="action-btn">
              <span class="action-icon">📋</span> Мои назначенные работы
            </a>
          `;
        }
        actionsContainer.innerHTML = html;
      }

      // ========== 4. ЗАГРУЗКА ПРОФИЛЯ ==========
      Promise.all([
        fetch('/me', {
          headers: { 'Authorization': `Bearer ${token}` }
        }),
        fetch('/api/works', {
          headers: { 'Authorization': `Bearer ${token}` }
        })
      ])
      .then(async ([profileRes, worksRes]) => {
        if (!profileRes.ok) {
          if (profileRes.status === 401) {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
          }
          throw new Error('Не удалось загрузить профиль');
        }
        const user = await profileRes.json();
        const works = worksRes.ok ? await worksRes.json() : [];

        localStorage.setItem('user', JSON.stringify(user));
        currentUser = user;

        const initial = (user.login || user.email || 'U')[0].toUpperCase();
        userAvatar.textContent = initial;
        userName.textContent = user.login || 'Пользователь';
        userEmail.textContent = user.email;
        updateRoleUI(user);
        worksCount.textContent = works.length;

        buildActions(user.role);
      })
      .catch(err => {
        console.error(err);
        document.querySelector('.dashboard-header').innerHTML +=
          `<div style="color:red; margin-top:10px;">Ошибка загрузки данных</div>`;
        buildActions('author');
      });

      // ========== 5. ШТОРКА СМЕНЫ РОЛИ ==========
      const roleToggleBtn = document.getElementById('roleToggleBtn');
      const roleDrawer = document.getElementById('roleDrawer');
      const closeDrawerBtn = document.getElementById('closeDrawerBtn');
      const drawerOverlay = document.getElementById('drawerOverlay');

      function openDrawer() {
        roleDrawer.classList.remove('hidden');
        roleDrawer.classList.add('open');
        drawerOverlay.classList.remove('hidden');
      }
      function closeDrawer() {
        roleDrawer.classList.remove('open');
        roleDrawer.classList.add('hidden');
        drawerOverlay.classList.add('hidden');
      }

      roleToggleBtn?.addEventListener('click', openDrawer);
      closeDrawerBtn?.addEventListener('click', closeDrawer);
      drawerOverlay?.addEventListener('click', closeDrawer);

      document.querySelectorAll('.role-option').forEach(btn => {
        btn.addEventListener('click', async function() {
          const newRole = this.dataset.role;
          const token = localStorage.getItem('token');
          try {
            const response = await fetch('/auth/role', {
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
              },
              body: JSON.stringify({ role: newRole })
            });
            if (!response.ok) {
              const err = await response.json();
              alert('Ошибка: ' + (err.error || 'Не удалось сменить роль'));
              return;
            }
            const data = await response.json();
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            currentUser = data.user;

            updateRoleUI(data.user);
            const initial = (data.user.login || data.user.email || 'U')[0].toUpperCase();
            userAvatar.textContent = initial;
            userName.textContent = data.user.login || 'Пользователь';
            userEmail.textContent = data.user.email;

            buildActions(data.user.role);

            closeDrawer();
          } catch (err) {
            alert('Ошибка соединения: ' + err.message);
          }
        });
      });

      // ========== 6. ВЫХОД ==========
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'index.html';
      });

    })();
  </script>
</body>
</html>
