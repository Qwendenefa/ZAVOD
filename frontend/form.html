<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рецензия</title>
    <!-- Подключаем ваш CSS -->
    <link rel="stylesheet" href="form.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="questionnaire">
        <h1 class="questionnaire-main-head">📝 Рецензия</h1>
        <form id="reviewForm" action="#" method="post">
            <div id="statusMessage"></div>
            <p class="question-label">На статью: <span id="articleTitle">(загрузка...)</span></p>
            <input type="hidden" id="work_id" name="work_id" value="">
            <hr>

            <!-- 1. Соответствие профилю -->
            <div class="question-group">
                <p class="question-label">1. Соответствие профилю журнала</p>
                <div class="radio-group">
                    <label class="square-radio">
                        <input type="radio" name="profile_match" value="да" required>
                        <span class="answer-subscribe">Да</span>
                    </label>
                    <label class="square-radio">
                        <input type="radio" name="profile_match" value="нет">
                        <span class="answer-subscribe">Нет</span>
                    </label>
                </div>
            </div>

            <!-- 2. Характер статьи -->
            <div class="question-group">
                <p class="question-label">2. Характер статьи</p>
                <div class="radio-group">
                    <label class="square-radio">
                        <input type="radio" name="article_type" value="обзорная" required>
                        <span class="answer-subscribe">Обзорная</span>
                    </label>
                    <label class="square-radio">
                        <input type="radio" name="article_type" value="оригинальная">
                        <span class="answer-subscribe">Оригинальная</span>
                    </label>
                </div>
            </div>

            <!-- 3. Оценка качества статьи (9 критериев — слайдеры) -->
            <div class="question-group">
                <p class="question-label">3. Оценка качества статьи</p>
                <div class="criteria-list" id="qualityCriteria">
                    <!-- сгенерировано скриптом -->
                </div>
            </div>

            <!-- 4. Заключение о публикации -->
            <div class="question-group">
                <p class="question-label">4. Заключение о публикации</p>
                <div class="radio-group vertical">
                    <label>
                        <input type="radio" name="publication_decision" value="as_is" required>
                        Статья может быть опубликована в предоставленном виде
                    </label>
                    <label>
                        <input type="radio" name="publication_decision" value="minor_revision">
                        Статья может быть опубликована с незначительными доработками
                    </label>
                    <label>
                        <input type="radio" name="publication_decision" value="major_revision">
                        Статья может быть опубликована при условии существенных исправлений (повторное рассмотрение)
                    </label>
                    <label>
                        <input type="radio" name="publication_decision" value="reject">
                        Статья не рекомендуется к публикации
                    </label>
                </div>
            </div>

            <!-- 5. Краткое обоснование -->
            <div class="question-group">
                <p class="question-label">5. Краткое обоснование заключения</p>
                <textarea name="justification" rows="6" cols="50" placeholder="Введите обоснование..."></textarea>
            </div>

            <!-- Кнопки -->
            <div class="buttons">
                <input class="submit-button" type="submit" value="Завершить">
            </div>
        </form>
    </div>

    <script>
        // ===== Описание критериев для блока 3 =====
        const qualityCriteria = [
            { name: 'quality_1', text: 'Актуальность проблематики' },
            { name: 'quality_2', text: 'Новизна материала' },
            { name: 'quality_3', text: 'Корректность употребления терминологии' },
            { name: 'quality_4', text: 'Уровень проведенных исследований' },
            { name: 'quality_5', text: 'Структурированность материала, логичность изложения' },
            { name: 'quality_6', text: 'Практическая значимость' },
            { name: 'quality_7', text: 'Представительность и актуальность используемых источников литературы' },
            { name: 'quality_8', text: 'Информативность аннотации' },
            { name: 'quality_9', text: 'Соответствие требованиям к оформлению статьи в журнале' },
        ];
        const qualityLevels = ['нет', 'низкая', 'средняя', 'высокая'];
        const qualityLevelsDisplay = ['Нет', 'Низкая', 'Средняя', 'Высокая'];

        function buildCriteriaSliders(container, items) {
            container.innerHTML = items.map((item, i) => `
                <div class="criterion-item">
                    <div class="criterion-top">
                        <span class="criterion-num">${i + 1}</span>
                        <span class="criterion-text">${item.text}</span>
                        <span class="criterion-current" data-current>${qualityLevelsDisplay[0]}</span>
                    </div>
                    <div class="slider-row">
                        <input type="range" class="grad-slider" min="1" max="4" step="1" value="1"
                               data-target="${item.name}"
                               data-labels="${qualityLevels.join(',')}"
                               data-display-labels="${qualityLevelsDisplay.join(',')}">
                        <div class="slider-ticks">
                            <span>Нет</span><span>Низкая</span><span>Средняя</span><span>Высокая</span>
                        </div>
                    </div>
                    <input type="hidden" name="${item.name}" value="${qualityLevels[0]}">
                </div>
            `).join('');
        }

        function setupGradSliders(root) {
            root.querySelectorAll('.grad-slider').forEach(slider => {
                const min = parseFloat(slider.min);
                const max = parseFloat(slider.max);
                const values = slider.dataset.labels ? slider.dataset.labels.split(',') : null;
                const displayLabels = slider.dataset.displayLabels ? slider.dataset.displayLabels.split(',') : null;
                const targetName = slider.dataset.target;
                const hidden = targetName ? root.querySelector(`input[type="hidden"][name="${targetName}"]`) : null;
                const item = slider.closest('.criterion-item');
                const currentEl = item ? item.querySelector('[data-current]') : null;
                const ticks = item ? item.querySelectorAll('.slider-ticks span') : null;

                function update() {
                    const val = parseFloat(slider.value);
                    const idx = Math.round(val - min);
                    const percent = (val - min) / (max - min);
                    const hue = Math.round(percent * 120);
                    const color = `hsl(${hue}, 75%, 45%)`;

                    slider.style.background = `linear-gradient(to right, ${color} 0%, ${color} ${percent * 100}%, #e2e8f0 ${percent * 100}%, #e2e8f0 100%)`;
                    slider.style.setProperty('--thumb-color', color);

                    if (values && hidden) hidden.value = values[idx];
                    if (currentEl && displayLabels) {
                        currentEl.textContent = displayLabels[idx];
                        currentEl.style.background = color;
                        currentEl.style.color = '#fff';
                    }
                    if (ticks) ticks.forEach((t, i) => t.classList.toggle('active', i === idx));
                }

                slider.addEventListener('input', update);
                update();
            });
        }

        buildCriteriaSliders(document.getElementById('qualityCriteria'), qualityCriteria);
        setupGradSliders(document);

        // ===== ОСНОВНАЯ ЛОГИКА ФОРМЫ =====
        (function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            const params = new URLSearchParams(window.location.search);
            const workId = params.get('workId');
            const form = document.getElementById('reviewForm');
            const statusMessage = document.getElementById('statusMessage');
            const articleTitle = document.getElementById('articleTitle');

            if (!workId) {
                statusMessage.innerHTML = '<div class="warning">⚠️ Не указана работа для оценки. Откройте эту форму со страницы списка работ.</div>';
                form.style.display = 'none';
                return;
            }
            document.getElementById('work_id').value = workId;

            // Загружаем информацию о работе и проверяем статус оценки
            Promise.all([
                fetch(`/api/works/${workId}`, { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch(`/api/works/${workId}/evaluation-status`, { headers: { 'Authorization': `Bearer ${token}` } })
            ]).then(async ([workRes, statusRes]) => {
                if (!workRes.ok) throw new Error('Работа не найдена');
                const work = await workRes.json();
                articleTitle.textContent = work.title;

                if (work.type !== 'article') {
                    statusMessage.innerHTML = '<div class="warning">⚠️ Эта форма предназначена для научных статей. Для конкурсных работ используйте форму экспертного листа.</div>';
                    form.style.display = 'none';
                    return;
                }

                if (!statusRes.ok) throw new Error('Не удалось проверить статус оценки');
                const status = await statusRes.json();

                if (status.isOwnWork) {
                    statusMessage.innerHTML = '<div class="warning">⚠️ Нельзя оценивать собственную работу.</div>';
                    form.style.display = 'none';
                    return;
                }

                if (status.alreadyEvaluated) {
                    statusMessage.innerHTML = `
                        <div class="warning">
                            ✅ Вы уже оценили эту работу.
                            <a href="results.html?workId=${workId}">Посмотреть результаты</a>
                        </div>
                    `;
                    form.style.display = 'none';
                }
            }).catch(err => {
                statusMessage.innerHTML = `<div class="warning">❌ ${err.message}</div>`;
                console.error(err);
            });

            // Обработка отправки формы
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Проверяем, что выбраны обязательные радио-группы
                const profileMatch = form.querySelector('input[name="profile_match"]:checked');
                const articleType = form.querySelector('input[name="article_type"]:checked');
                const pubDecision = form.querySelector('input[name="publication_decision"]:checked');
                if (!profileMatch || !articleType || !pubDecision) {
                    statusMessage.innerHTML = '<div class="warning">⚠️ Заполните все обязательные поля (вопросы 1, 2, 4).</div>';
                    return;
                }

                const formData = new FormData(form);
                const data = Object.fromEntries(formData);

                try {
                    const response = await fetch('/api/reviews', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(data)
                    });
                    const result = await response.json();

                    if (response.ok) {
                        statusMessage.innerHTML = '<div class="warning">✅ Рецензия успешно сохранена! Перенаправление...</div>';
                        setTimeout(() => {
                            window.location.href = `results.html?workId=${workId}`;
                        }, 1200);
                    } else {
                        statusMessage.innerHTML = `<div class="warning">❌ ${result.error || 'Ошибка сохранения'}</div>`;
                    }
                } catch (err) {
                    statusMessage.innerHTML = '<div class="warning">❌ Ошибка соединения с сервером</div>';
                    console.error(err);
                }
            });
        })();
    </script>
</body>
</html>
