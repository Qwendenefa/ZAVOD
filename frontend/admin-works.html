<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Администрирование работ — Экспертум</title>
  <link rel="stylesheet" href="index.css">
  <style>
    .admin-container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    .section-title {
      font-size: 20px;
      font-weight: 600;
      margin: 30px 0 15px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid #007cba;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-title .count {
      font-size: 16px;
      font-weight: normal;
      background: #f0f0f0;
      padding: 4px 12px;
      border-radius: 20px;
      color: #555;
    }
    .work-item {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      background: #fafafa;
      transition: box-shadow 0.2s;
    }
    .work-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .work-item h4 { margin: 0 0 8px 0; }
    .work-item .meta {
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .work-item .meta span { margin-right: 15px; }
    .work-item .actions {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .assign-form {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .assign-form select {
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 14px;
      min-width: 180px;
    }
    .assign-form button {
      background: #007cba;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .assign-form button:hover { background: #005f8a; }
    .assign-form button.secondary { background: #6c757d; }
    .assign-form button.secondary:hover { background: #5a6268; }
    .expert-checklist {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 4px;
    }
    .expert-checkbox {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 13px;
      cursor: pointer;
      background: #fff;
      transition: background 0.15s, border-color 0.15s;
    }
    .expert-checkbox:has(input:checked) {
      background: #e7f4fb;
      border-color: #007cba;
      color: #005f8a;
      font-weight: 500;
    }
    .expert-checkbox input { cursor: pointer; }
    .expert-checkbox.disabled { opacity: 0.4; cursor: not-allowed; }
    .assign-hint { font-size: 12px; color: #888; margin: 2px 0 4px; }
    .delete-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .delete-btn:hover { background: #c82333; }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }
    .status-pending { background: #ffc107; color: #000; }
    .status-assigned { background: #17a2b8; color: #fff; }
    .status-reviewed { background: #28a745; color: #fff; }
    .error-msg { color: red; }
    .empty-msg { color: #999; font-style: italic; margin: 10px 0; }
    .expert-info { background: #e9ecef; padding: 4px 10px; border-radius: 4px; display: inline-block; }
    .review-info { margin-top: 8px; background: #f8f9fa; padding: 10px; border-radius: 4px; }
    .review-info strong { display: inline-block; min-width: 60px; }
  </style>
</head>
<body>
  <header>
    <div class="navigation">
      <h1 class="logo"><a href="index.html">Экспертум</a></h1>
      <nav>
        <ul id="navMenu"></ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="admin-container">
      <h2>Панель администратора — управление работами</h2>
      <div id="worksContainer"></div>
    </div>
  </main>

  <footer>
    <div><h3>Контакты:</h3><p>email@example.com</p></div>
    <div><h3>Адрес:</h3><p>г. Москва, ул. Примерная, д. 1</p></div>
  </footer>

  <script>
    (function() {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = 'login.html'; return; }

      // Навигация
      document.getElementById('navMenu').innerHTML = `
        <li><a href="index.html">Главная</a></li>
        <li><a href="dashboard.html">Кабинет</a></li>
        <li><a href="#" id="logoutLink">Выйти</a></li>
      `;
      document.getElementById('logoutLink')?.addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'index.html';
      });

      const container = document.getElementById('worksContainer');

      // Функция для красивого отображения типа
      function getTypeName(type) {
        return type === 'article' ? 'Научная статья' :
               type === 'competition' ? 'Конкурсная работа' :
               type;
      }

      let experts = [];

      function loadExperts() {
        return fetch('/api/users?role=expert', {
          headers: { 'Authorization': `Bearer ${token}` }
        })
          .then(res => res.json())
          .then(data => { experts = data; })
          .catch(() => experts = []);
      }

      function loadWorks() {
        fetch('/admin/works', { headers: { 'Authorization': `Bearer ${token}` } })
          .then(res => {
            if (res.status === 403) {
              container.innerHTML = '<p class="error-msg">У вас нет прав администратора.</p>';
              return;
            }
            return res.json();
          })
          .then(works => {
            if (!works) return;
            renderWorks(works);
          })
          .catch(err => {
            container.innerHTML = '<p class="error-msg">Ошибка загрузки работ</p>';
            console.error(err);
          });
      }

      function renderWorks(works) {
        const pending = works.filter(w => w.status === 'pending');
        const assigned = works.filter(w => w.status === 'assigned');
        const reviewed = works.filter(w => w.status === 'reviewed');

        let html = '';

        // ---- Секция: Ожидают распределения ----
        html += `<div class="section-title">
          <span>📌 Ожидают распределения</span>
          <span class="count">${pending.length}</span>
        </div>`;
        if (pending.length === 0) {
          html += `<div class="empty-msg">Нет работ, ожидающих распределения.</div>`;
        } else {
          pending.forEach(w => {
            html += buildWorkCard(w, 'pending');
          });
        }

        // ---- Секция: Распределены ----
        html += `<div class="section-title" style="border-bottom-color:#17a2b8;">
          <span>👥 Распределены экспертам</span>
          <span class="count">${assigned.length}</span>
        </div>`;
        if (assigned.length === 0) {
          html += `<div class="empty-msg">Нет распределённых работ.</div>`;
        } else {
          assigned.forEach(w => {
            html += buildWorkCard(w, 'assigned');
          });
        }

        // ---- Секция: Оценены ----
        html += `<div class="section-title" style="border-bottom-color:#28a745;">
          <span>⭐ Оценены</span>
          <span class="count">${reviewed.length}</span>
        </div>`;
        if (reviewed.length === 0) {
          html += `<div class="empty-msg">Нет оценённых работ.</div>`;
        } else {
          reviewed.forEach(w => {
            html += buildWorkCard(w, 'reviewed');
          });
        }

        container.innerHTML = html;

        document.querySelectorAll('.assign-form').forEach(form => {
          form.addEventListener('submit', handleAssign);
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', handleDelete);
        });
        document.querySelectorAll('.expert-checklist').forEach(setupChecklistLimit);
      }

      // Не даём выбрать больше REQUIRED_EXPERTS (3) экспертов в одном списке
      function setupChecklistLimit(listEl) {
        const max = Number(listEl.dataset.max) || 3;
        const boxes = () => Array.from(listEl.querySelectorAll('input[type="checkbox"]'));
        function refresh() {
          const checkedCount = boxes().filter(b => b.checked).length;
          boxes().forEach(b => {
            const label = b.closest('.expert-checkbox');
            const disable = !b.checked && checkedCount >= max;
            b.disabled = disable;
            label.classList.toggle('disabled', disable);
          });
        }
        listEl.addEventListener('change', refresh);
        refresh();
      }

      function buildWorkCard(work, status) {
        const statusClass = {
          'pending': 'status-pending',
          'assigned': 'status-assigned',
          'reviewed': 'status-reviewed'
        }[status] || '';

        const statusLabels = {
          'pending': 'Ожидает',
          'assigned': 'Назначена',
          'reviewed': 'Оценена'
        };

        // Используем функцию для красивого отображения типа
        const typeDisplay = getTypeName(work.type);

        const REQUIRED_EXPERTS = 3;
        const selectedIds = (work.expert_ids || '').split(',').filter(Boolean).map(String);
        const reviewsCount = work.reviews_count || 0;

        function expertChecklist() {
          const options = experts.filter(e => e.id != work.user_id);
          if (options.length === 0) {
            return '<div class="assign-hint">Нет доступных экспертов (кроме автора работы).</div>';
          }
          return `
            <div class="expert-checklist" data-max="${REQUIRED_EXPERTS}">
              ${options.map(e => `
                <label class="expert-checkbox">
                  <input type="checkbox" name="expertIds" value="${e.id}" ${selectedIds.includes(String(e.id)) ? 'checked' : ''}>
                  ${e.login}
                </label>
              `).join('')}
            </div>
          `;
        }

        let actionsHtml = '';

        if (status === 'pending') {
          actionsHtml = `
            <form class="assign-form" data-work-id="${work.id}">
              <div class="assign-hint">Выберите до ${REQUIRED_EXPERTS} экспертов, которые будут оценивать работу:</div>
              ${expertChecklist()}
              <button type="submit">Назначить</button>
            </form>
          `;
        } else if (status === 'assigned') {
          actionsHtml = `
            <div class="expert-info">👥 Назначены: <strong>${work.experts || '—'}</strong> · оценок получено: ${reviewsCount}/${selectedIds.length || REQUIRED_EXPERTS}</div>
            <form class="assign-form" data-work-id="${work.id}">
              <div class="assign-hint">Измените состав экспертов (до ${REQUIRED_EXPERTS}) и нажмите «Обновить»:</div>
              ${expertChecklist()}
              <button type="submit" class="secondary">Обновить назначения</button>
            </form>
          `;
        } else if (status === 'reviewed') {
          actionsHtml = `
            <div class="review-info">
              <div><strong>Эксперты:</strong> ${work.experts || '—'}</div>
              <div><strong>Оценок получено:</strong> ${reviewsCount}/${selectedIds.length || REQUIRED_EXPERTS}</div>
              <div><a href="results.html?workId=${work.id}" target="_blank">📊 Посмотреть результаты</a></div>
            </div>
          `;
        }

        const deleteBtnHtml = `<button class="delete-btn" data-work-id="${work.id}">🗑️ Удалить</button>`;

        return `
          <div class="work-item" data-id="${work.id}">
            <h4>${work.title}</h4>
            <div class="meta">
              <span>📂 Тип: ${typeDisplay}</span>
              <span>👤 Автор: ${work.author_name || 'неизвестен'}</span>
              <span>📅 ${new Date(work.created_at).toLocaleDateString()}</span>
              <span class="status-badge ${statusClass}">${statusLabels[status]}</span>
            </div>
            <div class="actions">
              ${actionsHtml}
              ${deleteBtnHtml}
            </div>
          </div>
        `;
      }

      async function handleAssign(e) {
        e.preventDefault();
        const form = e.target;
        const workId = form.dataset.workId;
        const expertIds = Array.from(form.querySelectorAll('input[name="expertIds"]:checked'))
          .map(cb => Number(cb.value));

        if (expertIds.length === 0) {
          alert('Выберите хотя бы одного эксперта');
          return;
        }

        try {
          const res = await fetch(`/admin/works/${workId}/assign`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ expertIds })
          });
          if (!res.ok) {
            const err = await res.json();
            alert('Ошибка: ' + (err.error || 'Не удалось назначить'));
            return;
          }
          loadWorks();
        } catch (err) {
          alert('Ошибка соединения: ' + err.message);
        }
      }

      async function handleDelete(e) {
        const workId = e.target.dataset.workId;
        if (!confirm('Вы уверены, что хотите удалить эту работу и все связанные с ней данные (файл, рецензии, оценки)?')) {
          return;
        }

        try {
          const res = await fetch(`/admin/works/${workId}`, {
            method: 'DELETE',
            headers: {
              'Authorization': `Bearer ${token}`
            }
          });
          if (!res.ok) {
            const err = await res.json();
            alert('Ошибка: ' + (err.error || 'Не удалось удалить работу'));
            return;
          }
          loadWorks();
        } catch (err) {
          alert('Ошибка соединения: ' + err.message);
        }
      }

      loadExperts().then(() => loadWorks());
    })();
  </script>
</body>
</html>
