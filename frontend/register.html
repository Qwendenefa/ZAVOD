            <nav>
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> Главная</a></li>
                    <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> Войти</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="auth-main">
        <form id="registerForm" action="http://localhost:4000/auth/register" method="post">
            <h1 class="registration-header">
                <i class="fas fa-user-plus"></i> Регистрация
            </h1>

            <label for="login">Логин</label>
            <input type="text" id="login" name="login" placeholder="Введите логин" required>

            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" placeholder="Минимум 6 символов" required>

            <label for="passwordRepeat">Повторите пароль</label>
            <input type="password" id="passwordRepeat" name="passwordRepeat" placeholder="Повторите пароль" required>

            <label for="email">Электронная почта</label>
            <input type="email" id="email" name="email" placeholder="example@mail.com" required>

            <button type="submit" class="registration-btn">
                Зарегистрироваться
            </button>

            <div class="login-link">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </div>
        </form>
    </main>

    <footer>
        <div>
            <h3><i class="fas fa-envelope"></i> Контакты:</h3>
            <p>email@example.com</p>
        </div>
        <div>
            <h3><i class="fas fa-map-pin"></i> Адрес:</h3>
            <p>г. Москва, ул. Примерная, д. 1</p>
        </div>
    </footer>
</body>
</html>
