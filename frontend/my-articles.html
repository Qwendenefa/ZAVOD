<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои работы — Экспертум</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .work-card .work-status {
            font-size: 13px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #ffc107; color: #000; }
        .status-assigned { background: #17a2b8; color: #fff; }
        .status-reviewed { background: #28a745; color: #fff; }
        .result-link {
            background: #007cba;
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 13px;
            transition: background 0.2s;
        }
        .result-link:hover { background: #005f8a; }
        .work-meta .work-status-info { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    </style>
</head>

                    <li><a href="dashboard.html"><i class="fas fa-user"></i> Личный кабинет</a></li>

    <main>
        <div class="works-container">
            <h2><i class="fas fa-folder-open" style="color:#007cba;"></i> Мои работы</h2>
            <div id="worksList"><div style="text-align:center; padding: 40px;">Загрузка...</div></div>
            <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Вернуться в личный кабинет</a>
        </div>
    </main>

  <footer>
    <div><h3>Контакты:</h3><p>email@example.com</p></div>
    <div><h3>Адрес:</h3><p>г. Москва, ул. Примерная, д. 1</p></div>
  </footer>

    <script>
        // Глобальная функция скачивания файла
        window.downloadFile = async function(workId) {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('Вы не авторизованы');
                return;
            }
            try {
                const response = await fetch(`/api/works/${workId}/file`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(errText || 'Ошибка загрузки файла');
                }
                const blob = await response.blob();
                const disposition = response.headers.get('Content-Disposition');
                let filename = 'file';
                if (disposition && disposition.includes('filename=')) {
                    const match = disposition.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
                    if (match) filename = match[1].replace(/['"]/g, '');
                }
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (err) {
                alert('Не удалось скачать файл: ' + err.message);
            }
        };

        (function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('logoutLink').addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'index.html';
            });

            const container = document.getElementById('worksList');

            fetch('/api/works', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => {
                if (!res.ok) throw new Error('Не удалось загрузить работы');
                return res.json();
            })
            .then(works => {
                if (works.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>Вы ещё не загрузили ни одной работы.</p>
                            <a href="upload.html"><i class="fas fa-upload"></i> Загрузить первую работу</a>
                        </div>
                    `;
                    return;
                }

                let html = '<div class="works-grid">';
                works.forEach(w => {
                    const typeLabel = w.type === 'article' ? '📄 Научная статья' : '🏆 Конкурсная работа';
                    const date = new Date(w.created_at).toLocaleDateString('ru-RU', {
                        day: '2-digit', month: '2-digit', year: 'numeric'
                    });

                    // Определяем статус для отображения
                    let statusText = '';
                    let statusClass = '';
                    let resultLink = '';
                    if (w.status === 'pending') {
                        statusText = 'Ожидает назначения экспертов';
                        statusClass = 'status-pending';
                    } else if (w.status === 'assigned') {
                        const assigned = w.assigned_count || 0;
                        const reviewed = w.review_count || 0;
                        statusText = `Назначена (${reviewed}/${assigned} оценок)`;
                        statusClass = 'status-assigned';
                    } else if (w.status === 'reviewed') {
                        statusText = 'Оценена';
                        statusClass = 'status-reviewed';
                        resultLink = `<a href="results.html?workId=${w.id}" class="result-link"><i class="fas fa-chart-bar"></i> Посмотреть результаты</a>`;
                    }

                    html += `
                        <div class="work-card">
                            <div class="work-title">${w.title}</div>
                            <span class="work-type">${typeLabel}</span>
                            <div class="work-meta">
                                <div class="work-status-info">
                                    <button class="download-btn" onclick="downloadFile(${w.id})">📥 Скачать файл</button>
                                    <span class="work-date">${date}</span>
                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                    ${resultLink}
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            })
            .catch(err => {
                container.innerHTML = `<div style="color:red; text-align:center; padding: 20px;">❌ ${err.message}</div>`;
                console.error(err);
            });
        })();
    </script>
</body>
</html>
